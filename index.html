<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Showcase Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 0; background:#111; color:#fff; }
    header { padding:20px; text-align:center; background:#1a1a1a; }

    .grid {
      display:grid;
      grid-auto-flow: column;
      grid-auto-columns: 700px; /* 最大級サイズ */ /* 超大きく */ /* さらに大きく */ /* 横画像を大きく */
      gap:20px;
      padding:20px;
      overflow-x:auto;
      overflow-y:hidden;
    }

    .card { background:#222; padding:15px; border-radius:12px; }
    img {
  width:100%;
  height:420px; /* 超大型表示 */ /* さらに高さアップ */ /* 高さもアップ */ /* 高さ固定で見やすく */
  object-fit:cover; /* 横画像を綺麗にトリミング */
  border-radius:10px;
}
    button { padding:10px; border:none; border-radius:8px; cursor:pointer; }

    .admin {
      position:fixed;
      bottom:20px;
      right:20px;
      z-index:9999;
    }

    .modal {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:#000a;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9998;
    }

    .modal-content {
      background:#222;
      padding:20px;
      border-radius:12px;
      width:300px;
      max-height:80vh;
      overflow:auto;
    }

    input, textarea { width:100%; margin:5px 0; padding:8px; }

    .delete-btn {
      background:#ff4d4d;
      color:#fff;
      margin-top:5px;
    }
  </style>
</head>
<body>

<header>
  <h1>tset</h1>
</header>

<div class="grid" id="showcase"></div>
<p style="text-align:center;opacity:0.6;">※横にスクロールできます →</p>

<div class="admin">
  <button onclick="openLogin()">管理</button>
</div>

<!-- ログイン -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h3>ログイン</h3>
    <input type="password" id="password" placeholder="パスワード">
    <button onclick="login()">ログイン</button>
  </div>
</div>

<!-- 管理画面 -->
<div class="modal" id="adminModal">
  <div class="modal-content">
    <h3>追加</h3>
    <input id="title" placeholder="タイトル">
    <input id="image" placeholder="画像URL">
    <textarea id="desc" placeholder="説明"></textarea>
    <button onclick="addItem()">追加</button>

    <hr>

    <h3>削除</h3>
    <div id="adminList"></div>
  </div>
</div>

<script>
const ADMIN_PASS = "*****";

function getData(){
  return JSON.parse(localStorage.getItem("showcase") || "[]");
}

function saveData(data){
  localStorage.setItem("showcase", JSON.stringify(data));
}

function render(){
  const container = document.getElementById("showcase");
  container.innerHTML = "";

  getData().forEach((item,i)=>{
    container.innerHTML += `
      <div class="card">
        <img src="${item.image}">
        <h3>${item.title}</h3>
        <p>${item.desc}</p>
      </div>
    `;
  });
}

function renderAdmin(){
  const list = document.getElementById("adminList");
  list.innerHTML = "";

  getData().forEach((item,i)=>{
    list.innerHTML += `
      <div style="margin-bottom:10px;">
        <b>${item.title}</b><br>
        <button class="delete-btn" onclick="deleteItem(${i})">削除</button>
      </div>
    `;
  });
}

function openLogin(){
  document.getElementById("loginModal").style.display = "flex";
}

function login(){
  const pass = document.getElementById("password").value;
  if(pass === ADMIN_PASS){
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("adminModal").style.display = "flex";
    renderAdmin();
  } else {
    alert("違う");
  }
}

function addItem(){
  const data = getData();

  data.push({
    title: document.getElementById("title").value,
    image: document.getElementById("image").value,
    desc: document.getElementById("desc").value
  });

  saveData(data);
  render();
  renderAdmin();
}

function deleteItem(index){
  const data = getData();

  if(confirm("削除する？")){
    data.splice(index,1);
    saveData(data);
    render();
    renderAdmin();
  }
}

render();
</script>

</body>
</html>
